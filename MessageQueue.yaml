# MessageQueue.yaml
# Defines ALL queues (regular + dead message queues) in one place.
#
# Each queue entry:
#   name    (required) — queue name, e.g. "q/PurchaseOrder/Create"
#   topics  (optional) — list of topic strings to subscribe; omit or use [] for none
#   dmq     (optional) — name of the Dead Message Queue to associate with this queue
#                        omit entirely if this queue should have NO DMQ
#
# The 'dmq' value must be a valid queue name that will also be created
# in this same file as its own entry (without a dmq of its own).
#
# Topic wildcard examples:
#   "order/created/>"      — matches all sub-levels
#   "order/updated/POST"   — exact match
#   "inventory/*/reserve"  — single-level wildcard

queues:
  - name: "q/PurchaseOrder/Create"
    dmq: "dmq/PurchaseOrder/Create"
    topics:
      - "order/purchase/create"
      - "order/purchase/>"
  - name: "q/OrderConfirmation/POST/Update"
    dmq: "dmq/OrderConfirmation/POST/Update"
    topics:
      - "order/confirmation/POST/update"
  - name: "q/Inventory/Reserve"
  - name: "dmq/PurchaseOrder/Create"
  - name: "dmq/OrderConfirmation/POST/Update"

