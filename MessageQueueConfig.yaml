# MessageQueueConfig.yaml
# Settings applied to ALL regular queues in MessageQueue.yaml
# (i.e. queues whose name does NOT match any 'dmq' reference — they are treated as regular queues).
# Leave a field as "" (empty) to keep the Solace broker default for that setting.

queue_config:

  # Incoming messages enabled
  # true / false / "" (default)
  ingress_enabled: true

  # Outgoing messages enabled
  # true / false / "" (default)
  egress_enabled: true

  # Access Type: "exclusive" or "non-exclusive"
  # "" = default (exclusive)
  access_type: "non-exclusive"

  # Messages Queued Quota (MB)
  # "" = default
  max_msg_spool_usage: 5000

  # Owner (Solace client username)
  # "" = no owner
  owner: ""

  # Non-Owner Permission
  # "no-access" / "read-only" / "consume" / "modify-topic" / "delete"
  # "" = default
  permission: "consume"

  # Maximum Consumer Count
  # "" = default
  max_bind_count: 1000

  # Maximum Delivered Unacknowledged Messages per Flow
  # "" = default
  max_delivered_unacked_msgs_per_flow: 1

  # Enable Client Delivery Count
  # true / false / "" (default)
  delivery_count_enabled: false

  # Delivery Delay (sec)
  # 0 = no delay / "" = default
  delivery_delay: 0

  # Respect TTL
  # true / false / "" (default)
  respect_ttl: true

  # Maximum TTL (sec)
  # 0 = no max / "" = default
  max_ttl: 0

  # Redelivery enabled
  # true / false / "" (default)
  redelivery_enabled: true

  # Maximum Redelivery Count
  # "" = unlimited (when redelivery_enabled is true)
  max_redelivery_count: ""
